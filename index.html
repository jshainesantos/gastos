<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08080A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gastos" />
    <meta name="description" content="Track your expenses, set budgets, and see where your money goes." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Gastos</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      #splash {
        position: fixed;
        inset: 0;
        background: #08080A;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
        font-family: Inter, system-ui, sans-serif;
      }

      #splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .splash-icon {
        width: 88px;
        height: 88px;
        background: #111115;
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        font-weight: 800;
        color: #818CF8;
        margin-bottom: 20px;
        border: 1px solid rgba(255,255,255,0.06);
        animation: icon-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        box-shadow: 0 0 48px rgba(129, 140, 248, 0.18);
      }

      .splash-name {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #f8f8f8;
        animation: text-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
      }

      .splash-tagline {
        font-size: 13px;
        font-weight: 500;
        color: #52525B;
        margin-top: 6px;
        letter-spacing: 0.01em;
        animation: text-in 0.6s ease 0.2s both;
      }

      .splash-dots {
        display: flex;
        gap: 6px;
        margin-top: 48px;
        animation: text-in 0.4s ease 0.4s both;
      }

      .splash-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #818CF8;
        animation: dot-bounce 1.2s ease-in-out infinite;
      }

      .splash-dots span:nth-child(2) { animation-delay: 0.15s; background: #6366F1; }
      .splash-dots span:nth-child(3) { animation-delay: 0.3s;  background: #4F46E5; }

      @keyframes icon-in {
        from { opacity: 0; transform: scale(0.7) translateY(12px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }

      @keyframes text-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes dot-bounce {
        0%, 80%, 100% { transform: scale(1);   opacity: 0.4; }
        40%            { transform: scale(1.5); opacity: 1;   }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen — removed by React after mount -->
    <div id="splash">
      <div class="splash-icon">₱</div>
      <p class="splash-name">Gastos</p>
      <p class="splash-tagline">Track every peso.</p>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
